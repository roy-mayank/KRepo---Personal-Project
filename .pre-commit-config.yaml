repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: ruff format backend
        language: python
        additional_dependencies: ["ruff>=0.15.5"]
        pass_filenames: false
        files: ^backend/

      - id: ruff-lint
        name: ruff lint
        entry: ruff check --fix backend
        language: python
        additional_dependencies: ["ruff>=0.15.5"]
        pass_filenames: false
        files: ^backend/

      - id: basedpyright
        name: basedpyright
        entry: basedpyright backend
        language: system
        pass_filenames: false
        files: ^backend/
        verbose: true
        exit_code_map: { 1: 0 }

      - id: prettier
        name: prettier
        entry: npx prettier --write frontend/src
        language: node
        pass_filenames: false
        files: ^frontend/src/
