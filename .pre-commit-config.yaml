repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run --directory backend ruff format
        language: system
        types: [python]
        files: ^backend/

      - id: ruff-lint
        name: ruff lint
        entry: uv run --directory backend ruff check --fix
        language: system
        types: [python]
        files: ^backend/

      - id: prettier
        name: prettier
        entry: pnpm --dir frontend exec prettier --write
        language: system
        types_or: [ts, tsx, css, json]
        files: ^frontend/src/
